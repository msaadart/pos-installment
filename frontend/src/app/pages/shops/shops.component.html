<div class="page-container">
    <div class="content-wrapper">
        <div class="page-header">
            <h2>Shop Management</h2>
            <button class="btn btn-primary" (click)="toggleForm()">
                <span class="icon">{{ showForm ? '&times;' : '+' }}</span> {{ showForm ? 'Cancel' : 'New Shop' }}
            </button>
        </div>

        <!-- Add/Edit Form -->
        <div *ngIf="showForm" class="card form-card">
            <div class="card-header">
                <h3>{{ editingShop ? 'Edit Shop' : 'New Shop' }}</h3>
            </div>
            <form [formGroup]="shopForm" (ngSubmit)="onSubmit()" class="responsive-form">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label class="form-label">Shop Name</label>
                        <input type="text" class="form-control" formControlName="name"
                            placeholder="E.g., Downtown Branch">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="form-label">Contact</label>
                        <input type="text" class="form-control" formControlName="contact" placeholder="Phone Number">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-control" formControlName="address" placeholder="Full Address">
                    </div>
                </div>

                <div class="form-actions mt-3">
                    <button type="submit" class="btn btn-primary" [disabled]="shopForm.invalid">Save Shop</button>
                </div>
            </form>
        </div>

        <!-- Shop List -->
        <div class="card">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Contact</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let shop of shops">
                            <td data-label="ID">{{ shop.id }}</td>
                            <td data-label="Name" class="font-weight-bold">{{ shop.name }}</td>
                            <td data-label="Address">{{ shop.address }}</td>
                            <td data-label="Contact">{{ shop.contact }}</td>
                            <td data-label="Actions">
                                <button class="btn btn-primary btn-sm" (click)="editShop(shop)">Edit</button>
                            </td>
                        </tr>
                        <tr *ngIf="shops.length === 0">
                            <td colspan="5" class="text-center py-4 text-muted">No shops found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
