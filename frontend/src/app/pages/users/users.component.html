<div class="page-container">
    <div class="content-wrapper">
        <div class="page-header">
            <h2>User Management</h2>
            <button class="btn btn-primary" (click)="toggleForm()">
                <span class="icon">+</span> New User
            </button>
        </div>

        <!-- Add Form -->
        <div *ngIf="showForm" class="card form-card">
            <div class="card-header">
                <h3>New User</h3>
                <button class="btn-close" (click)="toggleForm()">&times;</button>
            </div>
            <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="responsive-form">
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" formControlName="name" placeholder="Full name">
                    </div>
                    <div class="form-group col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" formControlName="email" placeholder="Email address">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" formControlName="password"
                            placeholder="Secure password">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="form-label">Role</label>
                        <select class="form-control custom-select" formControlName="role">
                            <option value="SHOP_ADMIN">Shop Admin</option>
                            <option value="SALES_USER">Sales User</option>
                        </select>
                    </div>
                    <div class="form-group col-md-4">
                        <label class="form-label">Shop</label>
                        <select class="form-control custom-select" formControlName="shopId">
                            <option *ngFor="let shop of shops" [value]="shop.id">{{ shop.name }}</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions mt-3">
                    <button type="submit" class="btn btn-primary" [disabled]="userForm.invalid">Create User</button>
                    <button type="button" class="btn btn-secondary" (click)="toggleForm()">Cancel</button>
                </div>
            </form>
        </div>

        <!-- User List -->
        <div class="card">
            <div class="table-responsive">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Shop</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let user of users">
                            <td data-label="Name">{{ user.name }}</td>
                            <td data-label="Email">{{ user.email }}</td>
                            <td data-label="Role"><span class="badge"
                                    [ngClass]="user.role === 'SHOP_ADMIN' ? 'badge-primary' : 'badge-secondary'">{{
                                    user.role }}</span></td>
                            <td data-label="Shop">{{ user.shop?.name || '-' }}</td>
                        </tr>
                        <tr *ngIf="users.length === 0">
                            <td colspan="4" class="text-center py-4">No users found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
